        if (window.addEventListener) {
            window.addEventListener('unhandledrejection', function (event) {

                var add_str = event;
                if (event.hasOwnProperty('reason')) {
                    add_str = event.reason;
                }

                //window.jsLogger && window.jsLogger.error('window.onunhandledrejection ' + add_str, {

                if (event.hasOwnProperty('reason')) {
                    var err = false;
                    var firefox_note = "Could it be that you are using Firefox in 'private mode'? If so please try to reload the page in normal mode. Our app does not work in private mode as the Browser DB is not supported in private mode.\n\n" +
                        "Or did you disable the history of visited websites? To check, please go to  'Files' -> 'Preferences' -> 'Privacy & Security' and review your 'History' settings.\n\n";

                    if (event.reason.name === "InvalidStateError") {
                        err = 'InvalidStateError';
                        alert("Hello dear user,\n\nAn error has occurred while we tried to open the DB of your browser.\n\n" +
                            firefox_note +
                            "If you don't want to work without private mode please use Chrome as browser. Chrome does support the Browser DB even if in private mode.\n\n"
                        );
                    } else if (event.reason.name === "QuotaExceededError") {
                        err = 'QuotaExceededError';
                        alert("Hello dear user,\nan 'Quota Exceeded Error' occured while trying to open the DB of your browser.\n" +
                            "This happens when your browser can't reserve enough disk space anymore. This doesn't mean your disk is full, but that the space that is allotted to your browser for it to save files onto your local hard drive is full.\n" +
                            "How big this allotment is depends on your OS and browser. It usually is something about 10%-30% of the free space left on your hard drive."
                        );
                    } else if (event.reason.name === "MissingAPIError") {
                        err = 'MissingAPIError';
                        alert("Hello dear user,\nan error occured while we tried to open the DB of your browser.\nIt looks like your Browser doesn't support the IndexedDB which is required for the app." +
                            "Please try another browser."
                        );
                    } else if (event.reason.name === "OpenFailedError") {
                        err = 'OpenFailedError';
                        alert("Hello dear user,\nan error occured while we tried to open the DB of your browser.\nWe are not sure yet what is causing this error. It seems to be related to Firefox." +
                            firefox_note +
                            "If this doesn't help please try another browser."
                        );
                    }


                    if (err) {
                        window.jsLogger && window.jsLogger.info('Special alert: ' + err);
                    }
                }
